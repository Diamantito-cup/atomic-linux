---
# Configuraciones de montaje para el chroot de Atomic Linux
extraMounts:
    - device: proc
      fs: proc
      mountPoint: /proc
    - device: sys
      fs: sysfs
      mountPoint: /sys
    - device: dev
      fs: devtmpfs
      mountPoint: /dev
    - device: tmpfs
      fs: tmpfs
      mountPoint: /tmp
    - device: /run/udev
      mountPoint: /run/udev
      options: [ bind ]
